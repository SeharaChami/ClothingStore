# ============================================================
#  ClothingStore - Database configuration (Supabase PostgreSQL)
# ============================================================
#
#  HOW TO CONNECT TO YOUR SUPABASE PROJECT
#  ---------------------------------------
#  1. Create a project at https://supabase.com (it is hosted PostgreSQL).
#  2. In the dashboard open:  Project Settings -> Database -> Connection string.
#  3. Pick ONE of the two options below and fill in db.url / db.username:
#
#  OPTION A - Session pooler (RECOMMENDED, works on IPv4 networks):
#     db.url      = jdbc:postgresql://<pooler-host>:5432/postgres?sslmode=require
#     db.username = postgres.<project-ref>
#     The pooler host is shown in the dashboard ("Session pooler" entry),
#     e.g. aws-1-ap-northeast-1.pooler.supabase.com (the aws-0/aws-1 prefix
#     and the region vary per project - copy it exactly).
#
#  OPTION B - Direct connection (requires IPv6 connectivity):
#     db.url      = jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres?sslmode=require
#     db.username = postgres
#
#  IMPORTANT: db.url must be the JDBC/PostgreSQL connection string as shown
#  above - NOT the project's https://...supabase.co API URL.
#
#  4. db.password is the database password you chose when creating the project.
#  5. Run database/schema.sql in the Supabase SQL Editor to create the tables
#     and the default shop-owner account (the app can also create the tables
#     itself thanks to hibernate.hbm2ddl.auto=update, but the SQL script also
#     seeds the default login).
# ============================================================

db.url=jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require
db.username=postgres.ackhcpdazxyhuylqmhpx
db.password=@12345678910sehara

# Hibernate behaviour (sensible defaults - usually no need to touch)
hibernate.hbm2ddl.auto=update
hibernate.show_sql=false
